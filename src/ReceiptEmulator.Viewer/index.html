<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f9fc" />
    <link rel="icon" type="image/png" href="/pos-printer-emulator-icon.png" />
    <title>POS Printer Emulator</title>
    <script>
      try {
        const savedTheme = localStorage.getItem('pos-printer-emulator-theme') ?? localStorage.getItem('receipt-lab-theme')
        document.documentElement.dataset.theme = savedTheme === 'dark' ? 'dark' : 'light'
      } catch { document.documentElement.dataset.theme = 'light' }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
