name: Release version check

on:
  push:
  pull_request:

jobs:
  version-sync:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Verify public website matches the application release version
        run: dotnet run --project tools/ReceiptLab.Build -- sync-release --check
