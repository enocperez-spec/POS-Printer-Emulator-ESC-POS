name: Release version check

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  version-sync:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Verify Admin Dev Support and public website match the release manifest
        run: dotnet run --project tools/ReceiptLab.Build -- sync-release --check
      - name: Validate public website SEO
        run: dotnet run --project tools/ReceiptLab.Build -- check-seo
